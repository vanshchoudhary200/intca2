<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Email Detector</h2>
    <textarea id="emailText" placeholder="Paste email content here..."></textarea>
    <button onclick="checkEmail()">Detect</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    async function checkEmail() {
      const text = document.getElementById("emailText").value;

      const response = await fetch("/detect", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await response.json();
      document.getElementById("result").innerText = data.message;
    }
  </script>
</body>
</html>
